<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volt Garage</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --color-bg: #050505;
            --color-surface: #121212;
            --color-primary: #39ff14;
            --color-text: #ffffff;
            --color-text-muted: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--color-bg);
            color: var(--color-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                radial-gradient(circle at 0% 0%, rgba(57, 255, 20, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(57, 255, 20, 0.1) 0%, transparent 40%),
                linear-gradient(rgba(5, 5, 5, 0.95), rgba(5, 5, 5, 0.95)), 
                url('volt_garage_landing_bg_1777920767019.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 850px;
            text-align: center;
            z-index: 10;
        }

        header {
            margin-bottom: 30px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 5px;
            text-decoration: none;
            color: #fff;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo svg {
            filter: drop-shadow(0 0 10px rgba(57, 255, 20, 0.5));
            width: 38px;
            height: 38px;
        }

        .logo span.neon-text {
            color: var(--color-primary);
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
        }

        .tagline {
            font-size: 0.85rem;
            color: var(--color-text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 400;
            opacity: 0.8;
        }

        .hero-section {
            margin-bottom: 35px;
        }

        .coming-soon {
            font-size: clamp(2.5rem, 10vw, 5rem);
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(180deg, #ffffff 40%, #444444 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            line-height: 0.9;
            letter-spacing: -2px;
        }

        .progress-container {
            width: 240px;
            height: 3px;
            background: rgba(255, 255, 255, 0.05);
            margin: 20px auto;
            border-radius: 2px;
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            height: 100%;
            width: 40%;
            background: var(--color-primary);
            box-shadow: 0 0 15px var(--color-primary);
            animation: load 2.5s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes load {
            0% { left: -100%; width: 20%; }
            50% { left: 30%; width: 40%; }
            100% { left: 100%; width: 20%; }
        }

        .status-badge {
            color: var(--color-primary);
            font-weight: 900;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            font-size: 0.75rem;
            display: inline-block;
            padding: 6px 16px;
            background: rgba(57, 255, 20, 0.05);
            border: 1px solid rgba(57, 255, 20, 0.2);
            border-radius: 50px;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .info-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 18px;
            border-radius: 16px;
            text-align: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .info-card:hover {
            border-color: rgba(57, 255, 20, 0.3);
            transform: translateY(-4px);
            background: rgba(255,255,255,0.04);
        }

        .info-card label {
            display: block;
            font-size: 0.65rem;
            color: var(--color-primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 6px;
            font-weight: 800;
        }

        .info-card a {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            text-decoration: none;
        }

        .map-container {
            width: 100%;
            height: 240px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }

        .hours-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 18px 30px;
            border-radius: 16px;
            display: inline-block;
            width: 100%;
            max-width: 480px;
            margin-bottom: 30px;
        }

        .hours-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
            border-bottom: 1px solid rgba(255,255,255,0.02);
            padding-bottom: 6px;
        }

        .hours-row:last-child { 
            margin-bottom: 0; 
            border-bottom: none;
            padding-bottom: 0;
        }

        .hours-day { color: var(--color-text-muted); }
        .hours-val { font-weight: 600; color: #fff; }
        .closed { color: #ff3914; }

        .footer-kinter {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            letter-spacing: 1px;
            opacity: 0.8;
            margin-top: 30px;
        }

        .footer-kinter a {
            color: inherit;
            text-decoration: none;
            font-weight: 600;
        }

        .footer-kinter a:hover {
            color: var(--color-primary);
            opacity: 1;
        }

        .bg-glow {
            position: fixed;
            width: 70vw;
            height: 70vh;
            background: radial-gradient(circle, rgba(57, 255, 20, 0.04) 0%, rgba(0,0,0,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            filter: blur(60px);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .contact-grid { grid-template-columns: 1fr; gap: 10px; }
            .logo { font-size: 2.2rem; }
            .coming-soon { font-size: 3.5rem; }
            .hours-box { padding: 15px; }
            .hours-row { font-size: 0.8rem; }
            body { padding: 20px 15px; }
        }
    </style>
</head>
<body>
    <div class="bg-glow" style="top: -15%; left: -15%;"></div>
    <div class="bg-glow" style="bottom: -15%; right: -15%;"></div>

    <div class="container">
        <header>
            <div class="logo">
                <svg width="38" height="38" viewBox="0 0 24 24" fill="none">
                    <path d="M13 2L3 14H12L11 22L21 10H12L13 2Z" fill="var(--color-primary)"
                        stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
                <span>Volt <span class="neon-text">Garage</span></span>
            </div>
            <div class="tagline">Serwis Hulajnóg elektrycznych</div>
        </header>
        
        <main>
            <div class="hero-section">
                <h1 class="coming-soon">Strona<br>W Budowie</h1>
                
                <div class="progress-container">
                    <div class="progress-bar"></div>
                </div>

                <span class="status-badge">SERWIS JEST OTWARTY - ZAPRASZAMY!</span>
            </div>

            <div class="contact-grid">
                <div class="info-card">
                    <label>Zadzwoń do nas</label>
                    <a href="tel:+48453189499">+48 453 189 499</a>
                </div>
                <div class="info-card">
                    <label>Nasza lokalizacja</label>
                    <a href="https://maps.app.goo.gl/7eoACNYa4A24zH9v6" target="_blank">ul. Mangalia 4, Warszawa</a>
                </div>
            </div>

            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m8!1m3!1d28183.319577340826!2d21.0158083!3d52.1752712!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x471ecd83ec8b6e5f%3A0xccef43f8d7dfef11!2sSerwis%20hulajn%C3%B3g%20elektrycznych%20Volt%20Garage!5e1!3m2!1sen!2spl!4v1777963243620!5m2!1sen!2spl" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <div class="hours-box">
                <div class="hours-row">
                    <div class="hours-day">Poniedziałek - Piątek</div>
                    <div class="hours-val">09:00 - 19:00</div>
                </div>
                <div class="hours-row">
                    <div class="hours-day">Sobota</div>
                    <div class="hours-val">10:00 - 16:00</div>
                </div>
                <div class="hours-row">
                    <div class="hours-day">Niedziela</div>
                    <div class="hours-val closed">Zamknięte</div>
                </div>
            </div>
        </main>

        <footer>
            <div class="footer-kinter">
                Under construction with ❤️ by <a href="https://kinter.one" target="_blank">Kinter</a>
            </div>
        </footer>
    </div>
</body>
</html>
